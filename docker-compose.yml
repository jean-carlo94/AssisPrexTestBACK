services:
  app:
    build: .
    container_name: AssisPrex-api
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-assisprex_user}:${POSTGRES_PASSWORD:-assisprex_pass}@postgres:5432/${POSTGRES_DB:-assisprex_db}
      - POSTGRES_USER=${POSTGRES_USER:-assisprex_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-assisprex_pass}
      - POSTGRES_DB=${POSTGRES_DB:-assisprex_db}
      - SECRET_KEY=${SECRET_KEY}
      - API_V1_STR=${API_V1_STR}
      - PROJECT_NAME=${PROJECT_NAME}
      - APP_PORT=${APP_PORT:-8000}
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: AssisPrex-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-assisprex_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-assisprex_pass}
      - POSTGRES_DB=${POSTGRES_DB:-assisprex_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-assisprex_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: